<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic.UI</title>

    <!-- Correct Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Optional custom styles -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gradient-to-br from-slate-950 via-gray-900 to-black text-white min-h-screen">

    <!-- Header -->
<header class="border-b border-gray-800 bg-black/30 backdrop-blur-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col gap-4 items-center justify-between">

        <div class="flex items-center gap-3 w-full justify-center">
            <div class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></div>
            <h1 class="text-2xl font-extrabold bg-gradient-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent">
                Agentic.UI
            </h1>
        </div>

        <div class="w-full flex gap-2">
            <input
                id="user-prompt"
                type="text"
                placeholder="Describe a UI..."
                class="flex-1 bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition min-w-0">

            <button
                id="generate-btn"
                class="bg-gradient-to-r from-blue-600 to-cyan-500 hover:scale-105 transition-all duration-300 px-6 py-3 rounded-xl font-semibold shadow-lg whitespace-nowrap shrink-0">
                Generate
            </button>
        </div>
        
    </div>
</header>


    <!-- Main Layout -->
    <div class="max-w-7xl mx-auto p-4 md:p-6 flex flex-col lg:flex-row gap-6">

        <!-- Sidebar -->
        <aside class="lg:w-72 bg-gray-900/60 backdrop-blur-lg border border-gray-800 rounded-2xl p-5 shadow-xl">

            <h2 class="text-lg font-bold mb-2">
                Preset Experiments
            </h2>

            <p class="text-sm text-gray-400 mb-4">
                Click a preset to automatically fill the prompt.
            </p>

            <div class="space-y-3">

                <button class="preset-btn w-full text-left bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-xl p-3 transition">
                    💡 Crypto Dashboard Metric Grid
                </button>

                <button class="preset-btn w-full text-left bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-xl p-3 transition">
                    🎨 Cyberpunk Dark Login
                </button>

                <button class="preset-btn w-full text-left bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-xl p-3 transition">
                    📊 E-Commerce Pricing Table
                </button>

                <button class="preset-btn w-full text-left bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-xl p-3 transition">
                    📱 Mobile Banking Dashboard
                </button>

                <button class="preset-btn w-full text-left bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-xl p-3 transition">
                    🚀 SaaS Landing Page Hero
                </button>

            </div>

            <div class="mt-8 pt-4 border-t border-gray-800 text-center">

                <span class="text-xs text-gray-500 font-mono">
                    Engine v1.2.0 Beta
                </span>

            </div>
        </aside>

        <!-- Preview Area -->
        <main class="flex-1">

            <div class="bg-gray-950 border border-gray-800 rounded-2xl shadow-2xl min-h-[600px] overflow-hidden">

                <div class="border-b border-gray-800 px-5 py-3 flex items-center justify-between">

                    <div class="flex gap-2">
                        <div class="w-3 h-3 bg-red-500 rounded-full"></div>
                        <div class="w-3 h-3 bg-yellow-500 rounded-full"></div>
                        <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                    </div>

                    <span class="text-sm text-gray-500">
                        Live Preview
                    </span>

                </div>

                <div
                    id="ai-controlled-viewport"
                    class="p-6 min-h-[520px] flex items-center justify-center text-center">

                    <div>

                        <div class="text-6xl mb-4">
                            🤖
                        </div>

                        <h2 class="text-2xl font-bold mb-2">
                            Ready to Generate
                        </h2>

                        <p class="text-gray-400 max-w-md">
                            Describe any UI and the AI engine will generate a responsive interface preview here.
                        </p>

                    </div>

                </div>

            </div>

        </main>

    </div>

    <script src="app.js"></script>

</body>
</html>
